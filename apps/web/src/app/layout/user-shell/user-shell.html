<mat-toolbar class="toolbar">
  <button mat-icon-button (click)="sidenav.toggle()" class="menu-btn">
    <mat-icon>menu</mat-icon>
  </button>
  <a routerLink="/" class="toolbar-brand">
    <img src="annota-icon.svg" alt="Annota" class="toolbar-logo" />
    <span class="toolbar-title">Annota</span>
  </a>
  <span class="spacer"></span>
</mat-toolbar>

<mat-sidenav-container>
  <mat-sidenav
    #sidenav
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="!isMobile()"
    class="sidenav"
  >
    <div class="sidenav-header">
      <img src="annota-icon.svg" alt="Annota" class="sidenav-logo" />
      <span class="sidenav-brand">Annota</span>
      <p class="sidenav-subtitle">Vamos estudar!</p>
    </div>

    <mat-nav-list>
      <a
        mat-list-item
        routerLink="/"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeSidenavOnMobile()"
      >
        <mat-icon matListItemIcon>home</mat-icon>
        <span>Início</span>
      </a>
      <a
        mat-list-item
        routerLink="/study"
        routerLinkActive="active-link"
        (click)="closeSidenavOnMobile()"
      >
        <mat-icon matListItemIcon>auto_stories</mat-icon>
        <span>Estudar</span>
      </a>
      <a
        mat-list-item
        routerLink="/progress"
        routerLinkActive="active-link"
        (click)="closeSidenavOnMobile()"
      >
        <mat-icon matListItemIcon>trending_up</mat-icon>
        <span>Progresso</span>
      </a>
      <a
        mat-list-item
        routerLink="/mock-exam"
        routerLinkActive="active-link"
        (click)="closeSidenavOnMobile()"
      >
        <mat-icon matListItemIcon>timer</mat-icon>
        <span>Simulados</span>
      </a>
      <a
        mat-list-item
        routerLink="/flashcards"
        routerLinkActive="active-link"
        (click)="closeSidenavOnMobile()"
      >
        <mat-icon matListItemIcon>style</mat-icon>
        <span>Cartões</span>
      </a>
      <a
        mat-list-item
        routerLink="/schedule"
        routerLinkActive="active-link"
        (click)="closeSidenavOnMobile()"
      >
        <mat-icon matListItemIcon>calendar_month</mat-icon>
        <span>Cronograma</span>
      </a>
    </mat-nav-list>

    <div class="sidenav-footer">
      <mat-nav-list>
        @if (isAdmin()) {
          <a
            mat-list-item
            routerLink="/admin"
            routerLinkActive="active-link"
            (click)="closeSidenavOnMobile()"
          >
            <mat-icon matListItemIcon>settings</mat-icon>
            <span>Admin</span>
          </a>
        }
        <a
          mat-list-item
          class="logout-link"
          (click)="logout()"
        >
          <mat-icon matListItemIcon>logout</mat-icon>
          <span>Sair</span>
        </a>
      </mat-nav-list>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <main class="content-area">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
