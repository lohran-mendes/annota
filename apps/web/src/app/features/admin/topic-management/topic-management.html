<div class="page-header animate-fade-in-up">
  <div>
    <h1>Gerenciar Tópicos</h1>
    <p class="page-subtitle">Cadastre e edite os tópicos de cada matéria</p>
  </div>
  <button mat-flat-button color="primary" class="add-btn" (click)="openCreateDialog()">
    <mat-icon>add</mat-icon>
    Novo Tópico
  </button>
</div>

@if (loading()) {
  <div class="loading-container">
    <mat-spinner diameter="40"></mat-spinner>
  </div>
} @else {
  <mat-card class="table-card animate-fade-in-up">
    @if (topics().length === 0) {
      <div class="empty-state">
        <mat-icon>topic</mat-icon>
        <p>Nenhum tópico cadastrado ainda.</p>
        <button mat-stroked-button color="primary" (click)="openCreateDialog()">Criar primeiro tópico</button>
      </div>
    } @else {
      <table mat-table [dataSource]="topics()" class="data-table">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Nome</th>
          <td mat-cell *matCellDef="let topic">
            <span class="cell-primary">{{ topic.name }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="subject">
          <th mat-header-cell *matHeaderCellDef>Matéria</th>
          <td mat-cell *matCellDef="let topic">{{ topic.subjectName }}</td>
        </ng-container>

        <ng-container matColumnDef="questions">
          <th mat-header-cell *matHeaderCellDef>Questões</th>
          <td mat-cell *matCellDef="let topic">{{ topic.questionCount }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Ações</th>
          <td mat-cell *matCellDef="let topic">
            <button mat-icon-button color="primary" (click)="openEditDialog(topic)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="confirmDelete(topic)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    }
  </mat-card>
}
