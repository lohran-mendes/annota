<div class="page-header animate-fade-in-up">
  <div>
    <h1>Gerenciar Tópicos</h1>
    <p class="page-subtitle">Cadastre e edite os tópicos de cada matéria</p>
  </div>
  <button mat-flat-button color="primary" class="add-btn">
    <mat-icon>add</mat-icon>
    Novo Tópico
  </button>
</div>

<mat-card class="table-card animate-fade-in-up">
  <table mat-table [dataSource]="topics()" class="data-table">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let topic">
        <span class="cell-primary">{{ topic.name }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="subject">
      <th mat-header-cell *matHeaderCellDef>Matéria</th>
      <td mat-cell *matCellDef="let topic">{{ topic.subjectName }}</td>
    </ng-container>

    <ng-container matColumnDef="questions">
      <th mat-header-cell *matHeaderCellDef>Questões</th>
      <td mat-cell *matCellDef="let topic">{{ topic.questionCount }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Ações</th>
      <td mat-cell *matCellDef="let topic">
        <button mat-icon-button color="primary">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</mat-card>
